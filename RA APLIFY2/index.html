<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RAPLIFY - Your local commerce ecosystem. Discover nearby stores, order from kirana shops, bakeries & more with home delivery or shop pickup.">
    <meta name="keywords" content="local commerce, kirana store, bakery, home delivery, shop pickup, local shopping">
    <meta name="theme-color" content="#6C3CE1">
    <title>RAPLIFY - Local Commerce Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div id="app">
        <div id="splash-screen" class="splash-screen">
            <div class="splash-content">
                <div class="splash-logo">
                    <div class="logo-icon">
                        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                            <circle cx="32" cy="32" r="30" fill="url(#grad1)" />
                            <path d="M20 28L32 18L44 28V42C44 43.1 43.1 44 42 44H22C20.9 44 20 43.1 20 42V28Z" fill="white" fill-opacity="0.9"/>
                            <path d="M28 44V34H36V44" stroke="rgba(108,60,225,0.6)" stroke-width="2"/>
                            <defs>
                                <linearGradient id="grad1" x1="0" y1="0" x2="64" y2="64">
                                    <stop offset="0%" stop-color="#6C3CE1"/>
                                    <stop offset="100%" stop-color="#E14BC3"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h1 class="splash-title">RAPLIFY</h1>
                    <p class="splash-subtitle">Local Commerce Ecosystem</p>
                </div>
                <div class="splash-loader">
                    <div class="loader-bar"></div>
                </div>
            </div>
        </div>
        <div id="app-content" style="display:none;"></div>
    </div>

    <!-- Leaflet JS for Maps -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Scripts -->
    <script src="js/data/seedData.js"></script>
    <script src="js/data/store.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/router.js"></script>
    <script src="js/components/ui.js"></script>
    <script src="js/pages/roleSelect.js"></script>
    <script src="js/pages/auth.js"></script>
    <script src="js/pages/setupProfile.js"></script>
    <!-- Customer Pages -->
    <script src="js/pages/customer/home.js"></script>
    <script src="js/pages/customer/storeList.js"></script>
    <script src="js/pages/customer/storePage.js"></script>
    <script src="js/pages/customer/cart.js"></script>
    <script src="js/pages/customer/checkout.js"></script>
    <script src="js/pages/customer/orders.js"></script>
    <script src="js/pages/customer/orderDetail.js"></script>
    <script src="js/pages/customer/profile.js"></script>
    <!-- Seller Pages -->
    <script src="js/pages/seller/dashboard.js"></script>
    <script src="js/pages/seller/products.js"></script>
    <script src="js/pages/seller/orders.js"></script>
    <script src="js/pages/seller/storeSetup.js"></script>
    <script src="js/pages/seller/customers.js"></script>
    <script src="js/pages/seller/analytics.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
